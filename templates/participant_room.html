{% extends 'base.html' %}
{% block title %}{{ room.title }}{% endblock %}
{% block body %}
<div class="meeting-mobile" data-role="participant" data-join-token="{{ join_token }}" data-room-code="{{ room.code }}" data-participant-id="{{ participant.id }}">
  <header class="mobile-header">
    <div>
      <strong>{{ room.title }}</strong>
      <div class="muted small">{{ participant.display_name }}</div>
    </div>
    <button class="btn" id="toggleFullscreen">Tela cheia</button>
  </header>
  <section class="mobile-stage" id="mainStage">
    <video id="selectedVideo" autoplay playsinline></video>
    <div class="stage-empty" id="stageEmpty">Conectando...</div>
  </section>
  <section class="mobile-grid" id="videoGrid"></section>
  <section class="mobile-actions">
    <button class="round-btn" id="toggleMic">Mic</button>
    <button class="round-btn" id="toggleCam">Cam</button>
    <button class="round-btn" id="raiseHand">Pedir fala</button>
    <button class="round-btn" id="lowerHand">Baixar mão</button>
  </section>
  <section class="card slim mobile-vote" id="voteBox"></section>
</div>
<script>window.__INITIAL_STATE__ = {{ state|tojson }};</script>
<script src="{{ url_for('static', filename='js/meeting.js') }}"></script>
{% endblock %}
